<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Shahid Iqbal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">💻 Shahid</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        <li class="nav-item">
          <button id="modeToggle" class="btn btn-sm btn-light ms-3">🌙 Dark Mode</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">📬 Contact Me</h2>
  <form>
    <div class="mb-3">
      <label class="form-label">Your Name</label>
      <input type="text" class="form-control" placeholder="Enter your name" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Your Email</label>
      <input type="email" class="form-control" placeholder="Enter your email" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Your Message</label>
      <textarea class="form-control" rows="5" placeholder="Type your message here..." required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
  <p class="mt-4 text-muted text-center">Form is demo only. Contact via LinkedIn or WhatsApp.</p>
</div>

<script>
  const toggle = document.getElementById('modeToggle');
  const body = document.body;
  toggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    toggle.innerText = body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
  });
</script>
</body>
</html>
